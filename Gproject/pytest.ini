[pytest]
testpaths = tests
pythonpath = .
filterwarnings =
    ignore::DeprecationWarning
    ; Sprint 5: Pydantic 2.13 emits UnsupportedFieldAttributeWarning for
    ; AliasGenerator on Optional[...] fields even when the alias is taking
    ; effect at runtime (verified by passing tests). Silenced here so the
    ; suite output stays clean.
    ignore::pydantic.warnings.UnsupportedFieldAttributeWarning
